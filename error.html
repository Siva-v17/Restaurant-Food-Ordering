<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Stackly Kitchen</title>
<meta name="description" content="This page isn't on tonight's menu. Find your way back to Stackly Kitchen.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
    :root{
      --charcoal:#fbf5e9;
      --charcoal-2:#f2e7d2;
      --charcoal-3:#e4d3ac;
      --cream:#2b2318;
      --cream-dim:#5c5142;
      --ember:#e0592a;
      --ember-2:#c8481e;
      --gold:#a97a30;
      --forest:#4a5b45;
      --smoke:#8f8371;
      --line:rgba(43,35,24,0.12);
      --shadow:0 24px 50px -20px rgba(43,35,24,0.18);
      --ease:cubic-bezier(.16,.8,.28,1);
      --serif:'Fraunces',serif;
      --sans:'Manrope',sans-serif;
      --on-photo:#faf3e2;
      --on-photo-dim:#e6dcc6;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--charcoal);
      color:var(--cream);
      font-family:var(--sans);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }
    img{max-width:100%;display:block;}
    a{color:inherit;text-decoration:none;}
    ul{list-style:none;}
    button{font-family:var(--sans);cursor:pointer;}
    ::selection{background:var(--ember);color:var(--cream);}
    @media (prefers-reduced-motion: reduce){
      *{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important;scroll-behavior:auto !important;}
    }

    /* ---------- utility ---------- */
    .wrap{max-width:1280px;margin:0 auto;padding:0 6vw;}
    .eyebrow{
      font-family:var(--sans);font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;
      color:var(--gold);display:flex;align-items:center;gap:14px;font-weight:700;margin-bottom:18px;
      justify-content:center;
    }
    .eyebrow::before{content:'';width:34px;height:1px;background:var(--ember);display:inline-block;}
    h1,h2,h3,h4{font-family:var(--serif);font-weight:600;line-height:1.05;letter-spacing:-.01em;}
    .btn{
      display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:100px;
      font-size:.85rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid transparent;
      transition:transform .5s var(--ease),background .4s,color .4s,border-color .4s;position:relative;overflow:hidden;
    }
    .btn-primary{background:var(--ember);color:var(--cream);}
    .btn-primary:hover{transform:translateY(-3px);background:var(--ember-2);}
    .btn-ghost{border-color:var(--line);color:var(--cream);}
    .btn-ghost:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-3px);}

    /* ---------- nav ---------- */
    header.site{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      padding:20px 6vw;display:flex;align-items:center;justify-content:space-between;
      transition:padding .4s var(--ease),background .4s,border-color .4s,box-shadow .4s;
      background:rgba(251,245,233,0.9);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line);
    }
    header.site.scrolled{
      padding:13px 6vw;background:rgba(251,245,233,0.97);
      box-shadow:0 8px 24px -12px rgba(43,35,24,.15);
    }
    .nav-logo{display:inline-flex;align-items:center;line-height:0;}
    .nav-logo img{height:42px;width:auto;display:block;vertical-align:middle;transition:height .4s var(--ease);}
    header.site.scrolled .nav-logo img{height:34px;}
    nav.links{display:flex;gap:38px;align-items:center;}
    nav.links a{font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;font-weight:600;position:relative;padding:4px 0;color:var(--cream-dim);line-height:1;}
    nav.links a::after{content:'';position:absolute;left:0;bottom:0;width:0;height:1px;background:var(--ember);transition:width .4s var(--ease);}
    nav.links a:hover{color:var(--cream);}
    nav.links a:hover::after{width:100%;}
    .nav-actions{display:flex;align-items:center;gap:18px;}
    .burger{display:none;flex-direction:column;gap:5px;width:30px;z-index:1200;cursor:pointer;}
    .burger span{height:2px;background:var(--cream);border-radius:2px;transition:transform .35s var(--ease),opacity .3s;}
    .burger.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .burger.active span:nth-child(2){opacity:0;}
    .burger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

    .mobile-menu{
      position:fixed;inset:0;background:var(--charcoal-2);z-index:1100;display:flex;flex-direction:column;
      justify-content:center;align-items:flex-start;gap:22px;padding:8vw;transform:translateX(100%);
      transition:transform .55s var(--ease);
    }
    .mobile-menu.open{transform:translateX(0);}
    .mobile-menu a{font-family:var(--serif);font-size:2.2rem;color:var(--cream);}
    .mobile-close{
      position:absolute;top:26px;right:6vw;width:46px;height:46px;border-radius:50%;
      border:1px solid var(--line);background:var(--charcoal);color:var(--cream);
      display:flex;align-items:center;justify-content:center;transition:border-color .3s,color .3s,transform .4s var(--ease);
    }
    .mobile-close:hover{border-color:var(--ember);color:var(--ember-2);transform:rotate(90deg);}

    /* ---------- footer ---------- */
    footer.site{background:var(--charcoal-2);border-top:1px solid var(--line);padding:60px 0 40px;position:relative;}
    .footer-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1.2fr;gap:60px;padding-bottom:0;align-items:start;}
    .footer-grid h4{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:22px;font-family:var(--sans);font-weight:700;}
    .footer-grid li{margin-bottom:12px;color:var(--cream-dim);font-size:.94rem;}
    .footer-grid li a:hover{color:var(--ember-2);}
    .footer-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:36px;padding-top:24px;border-top:1px solid var(--line);font-size:.8rem;color:var(--smoke);flex-wrap:wrap;gap:14px;}
    .social-row{display:flex;align-items:center;gap:14px;}
    .social-row a{width:38px;height:38px;border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--cream-dim);transition:border-color .3s,transform .3s,color .3s,background .3s;}
    .social-row a:hover{border-color:var(--ember);color:var(--ember-2);background:rgba(232,98,44,.1);transform:translateY(-3px);}
    .news-form{display:flex;flex-direction:column;align-items:stretch;gap:16px;margin-top:14px;width:100%;background:var(--charcoal-2);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow);}
    .news-form input{background:var(--charcoal);border:1px solid var(--line);border-radius:10px;color:var(--cream);font-size:clamp(.72rem,3.4vw,.95rem);width:100%;min-width:0;outline:none;font-family:var(--sans);padding:12px 14px;}
    .news-form input:focus{border-color:var(--gold);}
    .news-form input:-webkit-autofill,
    .news-form input:-webkit-autofill:hover,
    .news-form input:-webkit-autofill:focus{
      -webkit-text-fill-color:var(--cream);
      box-shadow:0 0 0 1000px var(--charcoal) inset;
      -webkit-box-shadow:0 0 0 1000px var(--charcoal) inset;
      transition:background-color 9999s ease-in-out 0s;
    }
    .news-form input::placeholder{color:var(--smoke);}
    .news-form button{
      background:var(--ember);color:var(--cream);border:none;border-radius:100px;
      width:100%;padding:16px 24px;font-weight:700;font-size:.85rem;letter-spacing:.04em;
      text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px;
      transition:background .4s,transform .4s var(--ease);
    }
    .news-form button:hover{background:var(--ember-2);transform:translateY(-2px);}
    @media (max-width:380px){
      .news-form input{font-size:.68rem;padding:11px 12px;}
    }

    /* ---------- newsletter confirmation toast ---------- */
    .news-toast{
      position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
      background:var(--cream);color:var(--charcoal);padding:16px 26px;border-radius:100px;
      font-size:.9rem;font-weight:600;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;
      opacity:0;pointer-events:none;transition:opacity .4s var(--ease),transform .4s var(--ease);z-index:5000;
      white-space:nowrap;
    }
    .news-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .news-toast svg{flex-shrink:0;color:var(--ember);}
    @media (max-width:480px){
      .news-toast{white-space:normal;text-align:center;left:6vw;right:6vw;transform:translateY(20px);width:auto;}
      .news-toast.show{transform:translateY(0);}
    }

    /* ---------- scrollbar ---------- */
    ::-webkit-scrollbar{width:10px;}
    ::-webkit-scrollbar-track{background:var(--charcoal);}
    ::-webkit-scrollbar-thumb{background:var(--charcoal-3);border-radius:10px;}

    /* ---------- preloader ---------- */
    #preloader{position:fixed;inset:0;background:var(--charcoal);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;}
    .preloader-flame{width:56px;height:76px;position:relative;}
    .preloader-flame svg{width:100%;height:100%;overflow:visible;}
    .flame-outer{fill:url(#flameGrad);transform-origin:50% 100%;animation:flameFlicker 1.1s ease-in-out infinite;}
    .flame-inner{fill:var(--charcoal);opacity:.9;transform-origin:50% 100%;animation:flameFlicker 1.1s ease-in-out infinite .08s;}
    @keyframes flameFlicker{
      0%,100%{transform:scale(1,1) skewX(0deg);}
      25%{transform:scale(.94,1.05) skewX(-2deg);}
      50%{transform:scale(1.05,.95) skewX(2deg);}
      75%{transform:scale(.97,1.03) skewX(-1deg);}
    }
    #preloader .pre-word{font-family:var(--serif);font-size:2.2rem;font-style:italic;color:var(--cream);letter-spacing:.02em;}
    #preloader .pre-tag{font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-top:-14px;}
    #preloader .pre-bar{width:220px;height:2px;background:var(--line);position:relative;overflow:hidden;border-radius:2px;}
    #preloader .pre-bar span{position:absolute;left:0;top:0;bottom:0;width:0%;background:var(--ember);}

    /* ---------- 404 hero (signature) ---------- */
    .error-hero{
      position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;
      overflow:hidden;padding:160px 6vw 100px;text-align:center;
    }
    .ember-glow{
      position:absolute;left:50%;top:52%;width:900px;height:900px;transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(224,89,42,.16) 0%,rgba(224,89,42,0) 62%);
      pointer-events:none;
    }
    .error-hero .wrap{position:relative;z-index:2;max-width:760px;}
    .error-embers{position:absolute;inset:0;pointer-events:none;z-index:1;}
    .ember-spark{position:absolute;bottom:-10px;border-radius:50%;background:var(--ember);opacity:0;}
    .digit-row{
      display:flex;align-items:center;justify-content:center;gap:.02em;
      font-family:var(--serif);font-weight:700;line-height:.85;
      font-size:clamp(6rem,20vw,13rem);letter-spacing:-.02em;margin-bottom:8px;
    }
    .digit-row span{
      background:linear-gradient(180deg,var(--gold) 0%,var(--ember) 48%,var(--ember-2) 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
      position:relative;
    }
    .plate-zero{
      position:relative;display:inline-flex;align-items:center;justify-content:center;
      width:clamp(4.6rem,15vw,10rem);height:clamp(6rem,19.5vw,12.8rem);
    }
    .plate-zero svg{width:100%;height:100%;}
    .smoke-wisp{fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;opacity:.55;}
    .error-hero .eyebrow{margin-bottom:26px;}
    .error-hero h2{font-size:clamp(1.7rem,3.4vw,2.5rem);margin-bottom:18px;max-width:20ch;margin-left:auto;margin-right:auto;}
    .error-hero h2 em{color:var(--ember-2);font-style:italic;}
    .error-hero p{color:var(--cream-dim);font-size:1.05rem;line-height:1.75;max-width:52ch;margin:0 auto 40px;}
    .error-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
    .error-search{
      max-width:420px;margin:44px auto 0;display:flex;gap:10px;background:var(--charcoal-2);
      border:1px solid var(--line);border-radius:100px;padding:6px 6px 6px 22px;align-items:center;
      box-shadow:var(--shadow);
    }
    .error-search input{
      flex:1;background:none;border:none;outline:none;color:var(--cream);font-family:var(--sans);
      font-size:.9rem;min-width:0;
    }
    .error-search input::placeholder{color:var(--smoke);}
    .error-search button{
      background:var(--ember);color:var(--cream);border:none;border-radius:100px;width:42px;height:42px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .3s,transform .3s var(--ease);
    }
    .error-search button:hover{background:var(--ember-2);transform:rotate(8deg);}

    /* ---------- responsive ---------- */
    @media (max-width:1024px){
      .footer-grid{grid-template-columns:1fr 1fr;row-gap:40px;}
      .error-hero{min-height:90vh;}
    }
    @media (max-width:900px){
      nav.links{display:none;}
      .burger{display:flex;}
      .digit-row{gap:.01em;margin-bottom:4px;}
    }
    @media (max-width:768px){
      .error-hero{padding:150px 6vw 80px;}
      .error-hero p{font-size:1rem;max-width:44ch;}
      .ember-glow{width:640px;height:640px;}
    }
    @media (max-width:640px){
      .footer-grid{grid-template-columns:1fr;}
      .wrap{padding:0 7vw;}
      .error-hero{padding:140px 7vw 80px;min-height:auto;}
      .error-actions{flex-direction:column;width:100%;max-width:320px;margin:0 auto;}
      .error-actions .btn{width:100%;justify-content:center;}
      .error-search{margin-top:34px;padding:5px 5px 5px 18px;}
    }
    @media (max-width:480px){
      .error-hero h2{font-size:clamp(1.4rem,6vw,1.9rem);}
      .error-hero p{font-size:.92rem;max-width:34ch;}
      .digit-row{font-size:clamp(4.2rem,26vw,7rem);}
      .ember-glow{width:460px;height:460px;}
      .eyebrow{font-size:.64rem;letter-spacing:.2em;gap:10px;}
      .eyebrow::before{width:22px;}
    }
    @media (max-width:380px){
      .error-search{flex-direction:column;border-radius:18px;padding:14px;gap:12px;}
      .error-search input{width:100%;text-align:center;}
      .error-search button{width:100%;border-radius:100px;}
    }
</style></head>

<script>
    gsap.registerPlugin(ScrollTrigger);

    /* preloader */
    window.addEventListener('load',()=>{
      const bar=document.querySelector('#preloader .pre-bar span');
      const tl=gsap.timeline({defaults:{ease:'power3.out'}});
      tl.to(bar,{width:'100%',duration:1.1})
        .to('#preloader .pre-word, #preloader .pre-tag, #preloader .preloader-flame',{opacity:0,y:-16,duration:.5},'-=.2')
        .to('#preloader',{yPercent:-100,duration:.9,ease:'power4.inOut'},'-=.2')
        .set('#preloader',{display:'none'})
        .from('.hero-reveal',{y:60,opacity:0,duration:1.1,ease:'power3.out'},'-=.6')
        .from('.ember-spark',{opacity:0,duration:.6,stagger:.08},'-=.6');
    });

    /* nav scroll state */
    const header=document.querySelector('header.site');
    if(header){
      ScrollTrigger.create({
        start:'top -60',
        onUpdate:self=>{ header.classList.toggle('scrolled', self.scroll()>60); }
      });
    }

    /* mobile menu */
    const burger=document.querySelector('.burger');
    const mobileMenu=document.querySelector('.mobile-menu');
    const mobileClose=document.querySelector('.mobile-close');
    if(burger){
      burger.addEventListener('click',()=>{
        mobileMenu.classList.toggle('open');
        burger.classList.toggle('active');
      });
      document.querySelectorAll('.mobile-menu a').forEach(a=>a.addEventListener('click',()=>{
        mobileMenu.classList.remove('open');
        burger.classList.remove('active');
      }));
    }
    if(mobileClose){
      mobileClose.addEventListener('click',()=>{
        mobileMenu.classList.remove('open');
        if(burger) burger.classList.remove('active');
      });
    }

    /* rising embers */
    gsap.utils.toArray('.ember-spark').forEach(spark=>{
      const delay=gsap.utils.random(0,4);
      const drift=gsap.utils.random(-40,40);
      gsap.to(spark,{
        y:-gsap.utils.random(260,420),
        x:drift,
        opacity:0,
        duration:gsap.utils.random(4,6.5),
        delay,
        repeat:-1,
        ease:'power1.out',
        onRepeat:()=>gsap.set(spark,{y:0,x:0,opacity:.7})
      });
      gsap.set(spark,{opacity:.7});
    });

    /* go back */
    const goBackBtn=document.getElementById('goBackBtn');
    if(goBackBtn){
      goBackBtn.addEventListener('click',()=>{
        if(window.history.length>1){
          window.history.back();
        }else{
          window.location.href='index.html';
        }
      });
    }

    /* search — no backend yet, route to menu with query */
    const errorSearchForm=document.getElementById('errorSearchForm');
    if(errorSearchForm){
      errorSearchForm.addEventListener('submit',e=>{
        e.preventDefault();
        const q=errorSearchForm.querySelector('input').value.trim();
        window.location.href='menu.html'+(q?('?q='+encodeURIComponent(q)):'');
      });
    }

    /* newsletter toast */
    const newsForm = document.getElementById('newsForm');
    const newsToast = document.getElementById('newsToast');
    if(newsForm && newsToast){
      newsForm.addEventListener('submit', e=>{
        e.preventDefault();
        const input = newsForm.querySelector('input[type="email"]');
        if(!input.value) return;
        newsToast.classList.add('show');
        input.value = '';
        clearTimeout(newsForm._toastTimer);
        newsForm._toastTimer = setTimeout(()=> newsToast.classList.remove('show'), 3500);
      });
    }
</script></body></html>
